version: "3.8"

services:
  # 🔹 Service MariaDB
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    env_file: .env
    secrets:
      - credentials
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 🔹 Service WordPress
  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    env_file: .env
    secrets:
      - credentials
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/index.php || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # 🔹 Service NGINX
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    env_file: .env
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html:ro
    networks:
      - inception
    depends_on:
      wordpress:
        condition: service_healthy
    restart: unless-stopped

# 🔸 Définition des volumes persistants
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${SQL_DATA_PATH}

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WP_DATA_PATH}

# 🔸 Réseau personnalisé
networks:
  inception:
    driver: bridge
    name: inception

# 🔐 Secrets Docker
secrets:
  credentials:
    file: ../secrets/credentials.txt
